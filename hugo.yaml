baseURL: 'https://linuxreader.com/'
languageCode: 'en-us'
title: 'Linux Documentation Site'
theme: ["hugo-theme-relearn-9.0.3"]
publishDir: "docs"

params:
  #linktitle: 'Linux Reader'
  imagesDir: "content/images"
  lightbox: false
  alwaysopen: false
  editURL: ""
  author.name: "David Thomas"
  showVisitedLinks: true
  search.disable: false
  disableSearchHiddenPages: false
  disableSeoHiddenPages: false
  disableTagHiddenPages: false
  disableAssetsBusting: false
  disableGeneratorVersion: false
  disableInlineCopyToClipBoard: false
  disableShortcutsTitle: false
  disableLandingPageButton: true
  disableLanguageSwitchingButton: false
  disableMarkdownButton: false
  #disableBreadcrumb: true
  disableToc: false
  disableNextPrev: false
  ordersectionsby: "weight"
  themeVariant: "oled"
  titleSeparator: "::"
  highlightWrap: true
  collapsibleMenu: true
  disableExplicitIndexURLs: true
  externalLinkTarget: "_blank"

ignoreLogs: 
  - "warning-goldmark-raw-html"

outputs:
  home:
  - html
  - rss
  - markdown
  page:
  - html
  - markdown
  section:
  - html
  - rss
  - markdown

markup:
  highlight:
    guessSyntax: false
    style: "github-dark"

  goldmark:
    renderer:
      unsafe: true


